<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vols Baseball">
  <meta name="theme-color" content="#FF8200">
  <title>Vols Baseball 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: Georgia, serif; color: #fff; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #FF8200, #cc6600); padding: 52px 16px 18px; position: relative; overflow: hidden; }
    .hero-pattern { position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.04) 10px, rgba(0,0,0,0.04) 20px); }
    .hero-content { position: relative; display: flex; align-items: center; gap: 12px; }
    .hero-emoji { font-size: 42px; line-height: 1; }
    .hero-subtitle { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.85; font-family: sans-serif; }
    .hero-title { font-size: 24px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .hero-tag { font-size: 11px; opacity: 0.8; font-family: sans-serif; margin-top: 2px; }
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .next-game { background: rgba(255,130,0,0.12); border: 1px solid rgba(255,130,0,0.4); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .next-label { font-size: 10px; letter-spacing: 3px; color: #FF8200; font-family: sans-serif; text-transform: uppercase; margin-bottom: 4px; }
    .next-opponent { font-size: 17px; font-weight: bold; }
    .next-time { font-size: 12px; color: #aaa; font-family: sans-serif; }
    .location-badge { border-radius: 8px; padding: 5px 12px; font-size: 11px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .home-badge { background: rgba(255,130,0,0.2); border: 1px solid #FF8200; color: #FF8200; }
    .away-badge { background: rgba(255,255,255,0.08); border: 1px solid #555; color: #aaa; }
    .game-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid #FF8200; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    .game-card.win { border-color: rgba(74,222,128,0.2); border-left-color: #4ade80; }
    .game-card.loss { border-color: rgba(248,113,113,0.2); border-left-color: #f87171; }
    .date-block { text-align: center; min-width: 40px; }
    .date-num { font-size: 16px; font-weight: bold; color: #FF8200; }
    .date-day { font-size: 10px; color: #888; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .divider { width: 1px; height: 36px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .game-info { flex: 1; min-width: 0; }
    .game-opponent { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-meta { font-size: 11px; color: #888; font-family: sans-serif; margin-top: 2px; }
    .result { font-size: 13px; font-weight: bold; font-family: sans-serif; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
    .result.win { color: #4ade80; background: rgba(74,222,128,0.1); }
    .result.loss { color: #f87171; background: rgba(248,113,113,0.1); }
    .upcoming { font-size: 11px; color: #666; font-family: sans-serif; white-space: nowrap; }
    .spinner-wrap { text-align: center; padding: 60px 20px; }
    .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid rgba(255,130,0,0.2); border-top-color: #FF8200; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #FF8200; font-family: sans-serif; font-size: 13px; letter-spacing: 2px; }
    .error { text-align: center; padding: 40px 20px; color: #ff6b6b; font-family: sans-serif; font-size: 14px; }
    .footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 32px; }
    .last-updated { font-size: 11px; color: #555; font-family: sans-serif; }
    .refresh-btn { background: #FF8200; color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-size: 12px; font-weight: bold; font-family: sans-serif; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
    .refresh-btn:disabled { background: rgba(255,130,0,0.2); color: #FF8200; cursor: not-allowed; }
    .install-banner { background: rgba(255,130,0,0.1); border: 1px solid rgba(255,130,0,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-family: sans-serif; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-pattern"></div>
    <div class="hero-content">
      <div class="hero-emoji">🔶</div>
      <div>
        <div class="hero-subtitle">Tennessee Volunteers</div>
        <div class="hero-title">Baseball Schedule</div>
        <div class="hero-tag">Go Vols! 🏆</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="install-banner" id="install-banner" style="display:none;">
      📱 <strong style="color:#FF8200;">Add to Home Screen:</strong> Tap the Share button in Safari, then "Add to Home Screen" to install this as an app!
    </div>
    <div id="next-game"></div>
    <div id="games-list">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="loading-text">LOADING SCHEDULE...</div>
      </div>
    </div>
    <div class="footer">
      <div class="last-updated" id="last-updated"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchSchedule()">🔄 Refresh</button>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://purple-frog-d0a1.jamesforbes615.workers.dev';

    if (!window.navigator.standalone) {
      document.getElementById('install-banner').style.display = 'block';
    }

    async function fetchSchedule() {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      document.getElementById('games-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div class="loading-text">LOADING SCHEDULE...</div></div>';
      document.getElementById('next-game').innerHTML = '';

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            tools: [{ type: 'web_search_20250305', name: 'web_search' }],
            system: 'You are a sports data assistant. Search for the Tennessee Volunteers baseball schedule for 2025. Return ONLY a JSON array (no markdown, no backticks, no preamble) with up to 12 games mixing recent results and upcoming: [{"date":"Mar 15","day":"Sat","opponent":"Alabama","location":"home","time":"2:00 PM ET","result":null}]. location is "home" or "away". Played games: result = "W 7-3" or "L 4-2". Upcoming: result = null. Sort ascending by date. Return ONLY the JSON array.',
            messages: [{ role: 'user', content: 'Get the Tennessee Vols baseball 2025 schedule with recent results and upcoming games.' }]
          })
        });

        const data = await response.json();
        const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const games = JSON.parse(clean);
        renderGames(games);
        document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById('games-list').innerHTML = '<div class="error">Could not load schedule. Tap Refresh to try again.</div>';
      }
      btn.disabled = false;
    }

    function renderGames(games) {
      const nextGame = games.find(g => g.result === null);
      const nextEl = document.getElementById('next-game');
      if (nextGame) {
        const isHome = nextGame.location === 'home';
        nextEl.innerHTML = '<div class="next-game"><div><div class="next-label">Next Game</div><div class="next-opponent">vs ' + nextGame.opponent + '</div><div class="next-time">' + nextGame.date + ' · ' + nextGame.time + '</div></div><div class="location-badge ' + (isHome ? 'home-badge' : 'away-badge') + '">' + (isHome ? 'Home' : 'Away') + '</div></div>';
      }

      document.getElementById('games-list').innerHTML = games.map(function(game) {
        const hasResult = game.result !== null;
        const isWin = hasResult && game.result.startsWith('W');
        const cardClass = hasResult ? (isWin ? 'win' : 'loss') : '';
        const dateParts = (game.date || '').split(' ');
        return '<div class="game-card ' + cardClass + '"><div class="date-block"><div class="date-num">' + (dateParts[1] || game.date) + '</div><div class="date-day">' + (game.day || '') + '</div></div><div class="divider"></div><div class="game-info"><div class="game-opponent">' + (game.location !== 'home' ? '@ ' : '') + game.opponent + '</div><div class="game-meta">' + (game.location === 'home' ? 'Home' : 'Away') + ' · ' + game.time + '</div></div>' + (hasResult ? '<div class="result ' + (isWin ? 'win' : 'loss') + '">' + game.result + '</div>' : '<div class="upcoming">Upcoming</div>') + '</div>';
      }).join('');
    }

    fetchSchedule();
  </script>
</body>
</html>
