<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vols Baseball">
  <meta name="theme-color" content="#FF8200">
  <title>Vols Baseball</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; font-family: Georgia, serif; color: #fff; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #FF8200, #cc6600); padding: 52px 16px 18px; position: relative; overflow: hidden; }
    .hero-pattern { position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.04) 10px, rgba(0,0,0,0.04) 20px); }
    .hero-content { position: relative; display: flex; align-items: center; gap: 12px; }
    .hero-emoji { font-size: 42px; line-height: 1; }
    .hero-subtitle { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.85; font-family: sans-serif; }
    .hero-title { font-size: 24px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .hero-tag { font-size: 11px; opacity: 0.8; font-family: sans-serif; margin-top: 2px; }
    .container { padding: 16px; max-width: 520px; margin: 0 auto; }
    .cache-notice { background: rgba(255,130,0,0.08); border: 1px solid rgba(255,130,0,0.2); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-family: sans-serif; font-size: 11px; color: #aaa; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .cache-notice a { color: #FF8200; cursor: pointer; text-decoration: underline; white-space: nowrap; }
    .record-bar { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; }
    .record-item { flex: 1; text-align: center; }
    .record-item + .record-item { border-left: 1px solid rgba(255,255,255,0.08); }
    .record-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
    .record-val { font-size: 22px; font-weight: bold; margin-top: 2px; }
    .record-val.wins { color: #4ade80; }
    .record-val.losses { color: #f87171; }
    .record-val.pct { color: #FF8200; }
    .next-game { background: rgba(255,130,0,0.12); border: 1px solid rgba(255,130,0,0.4); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .next-label { font-size: 10px; letter-spacing: 3px; color: #FF8200; font-family: sans-serif; text-transform: uppercase; margin-bottom: 4px; }
    .next-opponent { font-size: 17px; font-weight: bold; }
    .next-time { font-size: 12px; color: #aaa; font-family: sans-serif; }
    .next-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 50%; background: rgba(255,255,255,0.1); padding: 4px; flex-shrink: 0; }
    .next-logo-fallback { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,130,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; font-family: sans-serif; font-weight: bold; color: #FF8200; }
    .location-badge { border-radius: 8px; padding: 5px 12px; font-size: 11px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; margin-left: auto; }
    .home-badge { background: rgba(255,130,0,0.2); border: 1px solid #FF8200; color: #FF8200; }
    .away-badge { background: rgba(255,255,255,0.08); border: 1px solid #555; color: #aaa; }
    .month-header { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #FF8200; font-family: sans-serif; margin: 20px 0 8px 4px; border-bottom: 1px solid rgba(255,130,0,0.2); padding-bottom: 6px; }
    .game-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid #555; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .game-card.upcoming { border-left-color: #FF8200; }
    .game-card.win { border-color: rgba(74,222,128,0.15); border-left-color: #4ade80; }
    .game-card.loss { border-color: rgba(248,113,113,0.15); border-left-color: #f87171; }
    .date-block { text-align: center; min-width: 46px; flex-shrink: 0; }
    .date-month { font-size: 11px; color: #FF8200; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    .date-num { font-size: 22px; font-weight: bold; color: #fff; line-height: 1.1; }
    .date-day { font-size: 10px; color: #888; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .divider { width: 1px; height: 44px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
    .team-logo { width: 34px; height: 34px; object-fit: contain; border-radius: 50%; background: rgba(255,255,255,0.08); padding: 3px; flex-shrink: 0; }
    .team-logo-fallback { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; color: #aaa; font-family: sans-serif; font-weight: bold; }
    .game-info { flex: 1; min-width: 0; }
    .game-opponent { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-meta { font-size: 11px; color: #888; font-family: sans-serif; margin-top: 2px; }
    .result { font-size: 13px; font-weight: bold; font-family: sans-serif; padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
    .result.win { color: #4ade80; background: rgba(74,222,128,0.1); }
    .result.loss { color: #f87171; background: rgba(248,113,113,0.1); }
    .upcoming-tag { font-size: 11px; color: #555; font-family: sans-serif; white-space: nowrap; flex-shrink: 0; }
    .spinner-wrap { text-align: center; padding: 60px 20px; }
    .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid rgba(255,130,0,0.2); border-top-color: #FF8200; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #FF8200; font-family: sans-serif; font-size: 13px; letter-spacing: 2px; }
    .error { text-align: center; padding: 40px 20px; color: #ff6b6b; font-family: sans-serif; font-size: 14px; line-height: 1.6; }
    .first-load { text-align: center; padding: 40px 20px; font-family: sans-serif; color: #aaa; font-size: 14px; line-height: 1.8; }
    .footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 32px; }
    .last-updated { font-size: 11px; color: #555; font-family: sans-serif; }
    .refresh-btn { background: #FF8200; color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-size: 12px; font-weight: bold; font-family: sans-serif; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
    .refresh-btn:disabled { background: rgba(255,130,0,0.2); color: #FF8200; cursor: not-allowed; }
    .install-banner { background: rgba(255,130,0,0.1); border: 1px solid rgba(255,130,0,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-family: sans-serif; font-size: 12px; color: #ccc; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-pattern"></div>
    <div class="hero-content">
      <div class="hero-emoji">🔶</div>
      <div>
        <div class="hero-subtitle">Tennessee Volunteers</div>
        <div class="hero-title">Baseball Schedule</div>
        <div class="hero-tag">Go Vols! 🏆</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="install-banner" id="install-banner" style="display:none;">
      📱 <strong style="color:#FF8200;">Add to Home Screen:</strong> Tap Share in Safari then "Add to Home Screen"!
    </div>
    <div id="cache-notice" style="display:none;" class="cache-notice">
      <div id="cache-text"></div>
      <a onclick="forceRefresh()">Refresh now</a>
    </div>
    <div id="record-bar" style="display:none;" class="record-bar">
      <div class="record-item"><div class="record-label">Wins</div><div class="record-val wins" id="rec-wins">0</div></div>
      <div class="record-item"><div class="record-label">Losses</div><div class="record-val losses" id="rec-losses">0</div></div>
      <div class="record-item"><div class="record-label">Record</div><div class="record-val pct" id="rec-pct">—</div></div>
    </div>
    <div id="next-game"></div>
    <div id="games-list"></div>
    <div class="footer">
      <div class="last-updated" id="last-updated"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="forceRefresh()">🔄 Refresh</button>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://purple-frog-d0a1.jamesforbes615.workers.dev';
    const CACHE_KEY = 'vols_v7';
    let isFetching = false;

    function getLogoUrl(opponent) {
      const c = (opponent||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
      const m = {
        'alabama':'333','arkansas':'8','auburn':'2','florida':'57','georgia':'61',
        'kentucky':'96','lsu':'99','mississippi state':'344','miss state':'344',
        'missouri':'142','ole miss':'145','south carolina':'2579','texas am':'245',
        'texas a m':'245','vanderbilt':'238','oklahoma':'201','oklahoma state':'197',
        'duke':'150','north carolina':'153','clemson':'228','virginia':'258',
        'miami':'2390','florida state':'52','georgia tech':'59','nc state':'152',
        'notre dame':'87','stanford':'24','ucla':'26','usc':'30','arizona':'12',
        'arizona state':'9','oregon':'2483','washington':'264',
        'east tennessee':'2181','etsu':'2181','hofstra':'2221',
        'north alabama':'2372','samford':'2534','unc asheville':'241',
        'chattanooga':'2111','lipscomb':'2352','belmont':'2057',
        'dallas baptist':'2166','wofford':'2747','mercer':'2381',
      };
      for (const k in m) { if (c.includes(k)) return 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/ncaa/500/'+m[k]+'.png&w=80&h=80'; }
      return null;
    }

    function parseDate(d) {
      if (!d) return null;
      const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      const p = d.toLowerCase().trim().split(' ');
      if (p.length >= 2) { const mo=months[p[0].substring(0,3)], dy=parseInt(p[1]); if (mo!==undefined && !isNaN(dy)) return new Date(2025,mo,dy); }
      return null;
    }

    function saveCache(games) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({games, ts: Date.now()})); } catch(e){} }

    function loadCache() {
      try {
        const r = localStorage.getItem(CACHE_KEY);
        if (!r) return null;
        return JSON.parse(r); // No expiry — keep forever until user refreshes
      } catch(e) { return null; }
    }

    function showCacheNotice(ts) {
      const age = Math.round((Date.now()-ts)/60000);
      const s = age < 60 ? age+'m ago' : age < 1440 ? Math.round(age/60)+'h ago' : Math.round(age/1440)+'d ago';
      document.getElementById('cache-text').textContent = 'Last updated ' + s;
      document.getElementById('cache-notice').style.display = 'flex';
    }

    async function forceRefresh() {
      if (isFetching) return;
      isFetching = true;
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      document.getElementById('games-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div class="loading-text">LOADING SCHEDULE...</div></div>';
      document.getElementById('next-game').innerHTML = '';
      document.getElementById('record-bar').style.display = 'none';
      document.getElementById('cache-notice').style.display = 'none';

      try {
        // Step 1: Search for schedule
        const searchRes = await fetch(WORKER_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1500,
            tools: [{type:'web_search_20250305',name:'web_search'}],
            messages: [{role:'user',content:'Search for the Tennessee Volunteers baseball 2025 season schedule including all game dates, opponents, scores for games already played, and times for upcoming games.'}]
          })
        });
        const searchData = await searchRes.json();
        if (searchData.error) throw new Error(searchData.error.message);
        const searchText = searchData.content.map(b=>b.type==='text'?b.text:'').join('');

        // Step 2: Format as JSON
        const fmtRes = await fetch(WORKER_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1500,
            system: 'You output ONLY a raw JSON array. No prose, no markdown, no backticks, no explanation. Your entire response must begin with [ and end with ]. Each game: {"date":"Feb 14","day":"Fri","opponent":"Hofstra","location":"home","time":"4:00 PM ET","result":"W 8-2"}. location=home or away. result="W 7-3" or "L 4-2" for played games, null for upcoming. Sort oldest first. BEGIN YOUR RESPONSE WITH [',
            messages: [
              {role:'user', content:'Here is the Tennessee Vols 2025 baseball schedule data. Convert every game into the JSON array format. Start with [:\n\n' + searchText.substring(0, 3000)}
            ]
          })
        });
        const fmtData = await fmtRes.json();
        if (fmtData.error) throw new Error(fmtData.error.message);
        const text = fmtData.content.map(b=>b.type==='text'?b.text:'').join('').trim();
        const match = text.match(/\[[\s\S]*\]/);
        if (!match) {
          console.log('Raw response:', text.substring(0, 500));
          throw new Error('No data returned — try refreshing again');
        }
        let games = JSON.parse(match[0]);
        games = games.filter(g=>g&&g.opponent&&g.date);
        games.sort((a,b)=>{ const da=parseDate(a.date),db=parseDate(b.date); return (!da||!db)?0:da-db; });
        saveCache(games);
        renderGames(games);
        showCacheNotice(Date.now());
        document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById('games-list').innerHTML = '<div class="error">Could not load schedule.<br><small style="color:#888;font-size:11px;">'+e.message+'</small></div>';
      }
      isFetching = false;
      btn.disabled = false;
      btn.textContent = '🔄 Refresh';
    }

    function renderGames(games) {
      const wins = games.filter(g=>g.result&&g.result.startsWith('W')).length;
      const losses = games.filter(g=>g.result&&g.result.startsWith('L')).length;
      if (wins+losses > 0) {
        document.getElementById('rec-wins').textContent = wins;
        document.getElementById('rec-losses').textContent = losses;
        document.getElementById('rec-pct').textContent = wins+'-'+losses;
        document.getElementById('record-bar').style.display = 'flex';
      }

      const next = games.find(g=>!g.result);
      if (next) {
        const isHome = next.location==='home';
        const logo = getLogoUrl(next.opponent);
        const logoHtml = logo ? '<img src="'+logo+'" class="next-logo" onerror="this.style.display=\'none\'">' : '<div class="next-logo-fallback">'+(next.opponent||'?').charAt(0)+'</div>';
        document.getElementById('next-game').innerHTML = '<div class="next-game">'+logoHtml+'<div style="flex:1"><div class="next-label">Next Game</div><div class="next-opponent">vs '+next.opponent+'</div><div class="next-time">'+next.date+' · '+(next.time||'TBD')+'</div></div><div class="location-badge '+(isHome?'home-badge':'away-badge')+'">'+(isHome?'Home':'Away')+'</div></div>';
      }

      let currentMonth = '', html = '';
      games.forEach(function(game) {
        const parts = (game.date||'').trim().split(' ');
        const month = parts[0]||'';
        const day = parts[1]||'';
        const hasResult = game.result !== null && game.result !== undefined;
        const isWin = hasResult && game.result.startsWith('W');
        const cardClass = hasResult ? (isWin?'win':'loss') : 'upcoming';

        if (month && month !== currentMonth) {
          currentMonth = month;
          html += '<div class="month-header">— '+month+' 2025 —</div>';
        }

        const logo = getLogoUrl(game.opponent);
        const logoHtml = logo
          ? '<img src="'+logo+'" class="team-logo" onerror="this.style.display=\'none\'">'
          : '<div class="team-logo-fallback">'+(game.opponent||'?').charAt(0)+'</div>';
        const timeStr = (!game.time||game.time==='null'||game.time==='TBA') ? 'TBD' : game.time;

        html += '<div class="game-card '+cardClass+'">' +
          '<div class="date-block">' +
            '<div class="date-month">'+month+'</div>' +
            '<div class="date-num">'+day+'</div>' +
            '<div class="date-day">'+(game.day||'')+'</div>' +
          '</div>' +
          '<div class="divider"></div>' +
          logoHtml +
          '<div class="game-info">' +
            '<div class="game-opponent">'+(game.location!=='home'?'@ ':'')+game.opponent+'</div>' +
            '<div class="game-meta">'+(game.location==='home'?'Home':'Away')+' · '+timeStr+'</div>' +
          '</div>' +
          (hasResult ? '<div class="result '+(isWin?'win':'loss')+'">'+game.result+'</div>' : '<div class="upcoming-tag">Upcoming</div>') +
          '</div>';
      });

      document.getElementById('games-list').innerHTML = html||'<div class="error">No games found.</div>';
    }

    // On load — always show cached data, never auto-fetch
    const cached = loadCache();
    if (cached) {
      renderGames(cached.games);
      showCacheNotice(cached.ts);
      document.getElementById('last-updated').textContent = 'Tap Refresh to update';
    } else {
      document.getElementById('games-list').innerHTML = '<div class="first-load">No schedule saved yet.<br>Tap <strong style="color:#FF8200;">🔄 Refresh</strong> to load the schedule.</div>';
    }

    if (!window.navigator.standalone) { document.getElementById('install-banner').style.display = 'block'; }
  </script>
</body>
</html>
