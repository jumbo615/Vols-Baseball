<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Vols Baseball">
  <meta name="theme-color" content="#FF8200">
  <title>Vols Baseball 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    header { background: #FF8200; padding: 48px 20px 16px; }
    header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    header p { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 2px; }
    .bar { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    .timestamp { font-size: 11px; color: #666; }
    .refresh-btn { background: #FF8200; color: #000; border: none; border-radius: 6px; padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .refresh-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .content { padding: 16px 20px 40px; max-width: 540px; margin: 0 auto; }
    .record { display: flex; gap: 12px; margin-bottom: 20px; }
    .record-box { flex: 1; background: #1a1a1a; border-radius: 8px; padding: 10px; text-align: center; }
    .record-box .val { font-size: 24px; font-weight: 700; }
    .record-box .lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .wins .val { color: #4ade80; }
    .losses .val { color: #f87171; }
    .rec .val { color: #FF8200; }
    .next-box { background: #1a1a1a; border: 1px solid #FF8200; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
    .next-lbl { font-size: 10px; color: #FF8200; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .next-opponent { font-size: 18px; font-weight: 700; }
    .next-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .game { display: flex; align-items: center; gap: 12px; background: #1a1a1a; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; border-left: 3px solid #333; }
    .game.win { border-left-color: #4ade80; }
    .game.loss { border-left-color: #f87171; }
    .game.upcoming { border-left-color: #FF8200; }
    .date-col { text-align: center; min-width: 44px; flex-shrink: 0; }
    .date-col .mon { font-size: 11px; font-weight: 700; color: #FF8200; text-transform: uppercase; }
    .date-col .num { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
    .date-col .dow { font-size: 10px; color: #555; text-transform: uppercase; }
    .sep { width: 1px; height: 40px; background: #2a2a2a; flex-shrink: 0; }
    .logo { width: 36px; height: 36px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #888; flex-shrink: 0; overflow: hidden; }
    .logo img { width: 100%; height: 100%; object-fit: contain; padding: 3px; }
    .info { flex: 1; min-width: 0; }
    .info .opp { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .info .meta { font-size: 11px; color: #666; margin-top: 2px; }
    .score { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
    .score.win { color: #4ade80; background: rgba(74,222,128,0.1); }
    .score.loss { color: #f87171; background: rgba(248,113,113,0.1); }
    .score.tbd { color: #444; font-size: 11px; font-weight: 400; }
    .err { color: #f87171; font-size: 12px; text-align: center; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 12px; }
    .spin-wrap { text-align: center; padding: 30px; color: #666; font-size: 12px; }
    .spin { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #222; border-top-color: #FF8200; animation: s 0.7s linear infinite; margin: 0 auto 8px; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="bar">

</div>
<div class="content">
  <div class="record">
    <div class="record-box wins"><div class="val" id="w">0</div><div class="lbl">Wins</div></div>
    <div class="record-box losses"><div class="val" id="l">0</div><div class="lbl">Losses</div></div>
    <div class="record-box rec"><div class="val" id="r">—</div><div class="lbl">Record</div></div>
  </div>
  <div id="next" style="display:none" class="next-box">
    <div class="next-lbl">Next Game</div>
    <div class="next-opponent" id="next-opp"></div>
    <div class="next-meta" id="next-meta"></div>
  </div>
  <div id="err"></div>
  <div id="list"></div>
</div>

const LOGOS = {
  'alabama':'333','arkansas':'8','auburn':'2','florida':'57','georgia':'61',
  'kentucky':'96','lsu':'99','mississippi state':'344','missouri':'142',
  'ole miss':'145','south carolina':'2579','texas':'251','texas am':'245',
  'vanderbilt':'238','oklahoma':'201','oklahoma state':'197','duke':'150',
  'north carolina':'153','clemson':'228','virginia':'258','virginia tech':'259',
  'miami':'2390','florida state':'52','georgia tech':'59','nc state':'152',
  'notre dame':'87','stanford':'24','ucla':'26','usc':'30','arizona':'12',
  'arizona state':'9','oregon':'2483','washington':'264',
  'etsu':'2181','east tennessee':'2181','hofstra':'2221',
  'north alabama':'2372','samford':'2534','unc asheville':'241',
  'chattanooga':'2111','lipscomb':'2352','belmont':'2057',
  'dallas baptist':'2166','wofford':'2747','mercer':'2381',
  'nicholls':'2450','kent state':'2190','wright state':'2750',
  'tennessee tech':'2572','eastern kentucky':'2198','bellarmine':'688',
  'oakland':'2473','northern kentucky':'2448',
};

function logo(opp) {
  const k = (opp||'').toLowerCase().replace(/[^a-z0-9 ]/g,'');
  for (const n in LOGOS) if (k.includes(n)) return 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/ncaa/500/'+LOGOS[n]+'.png&w=80&h=80';
  return null;
}

function fmtTs(ts) {
  const d = new Date(ts);
  return 'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function saveCache(overrides) {
  try { localStorage.setItem(CACHE, JSON.stringify({overrides, ts: Date.now()})); } catch(e){}
}

function loadCache() {
  try { const r = localStorage.getItem(CACHE); return r ? JSON.parse(r) : null; } catch(e){ return null; }
}

function applyOverrides(schedule, overrides) {
  if (!overrides) return schedule;
  return schedule.map(function(g, i) {
    const key = i + '_' + g.date.replace(' ','').toLowerCase() + '_' + g.opponent.toLowerCase().replace(/\s/g,'');
    return overrides[key] ? Object.assign({}, g, {result: overrides[key]}) : g;
  });
}

function render(games) {
  const wins = games.filter(g => g.result && g.result[0]==='W').length;
  const losses = games.filter(g => g.result && g.result[0]==='L').length;
  document.getElementById('w').textContent = wins;
  document.getElementById('l').textContent = losses;
  document.getElementById('r').textContent = wins+'-'+losses;

  const next = games.find(g => !g.result);
  if (next) {
    const loc = next.location==='home' ? 'Home' : next.location==='away' ? 'Away' : 'Neutral Site';
    document.getElementById('next-opp').textContent = (next.location==='away'?'@ ':'')+next.opponent;
    document.getElementById('next-meta').textContent = next.date + ' · ' + next.time + ' · ' + loc;
    document.getElementById('next').style.display = 'block';
  }

  let html = '';
  games.forEach(function(g) {
    const parts = (g.date||'').split(' ');
    const mon = parts[0]||'', num = parts[1]||'';
    const hasResult = g.result && (g.result[0]==='W'||g.result[0]==='L');
    const isWin = hasResult && g.result[0]==='W';
    const cls = hasResult ? (isWin?'win':'loss') : 'upcoming';
    const l = logo(g.opponent);
    const logoHtml = l
      ? '<div class="logo"><img src="'+l+'" onerror="this.parentNode.innerHTML=\''+((g.opponent||'?')[0])+'\'"></div>'
      : '<div class="logo">'+(g.opponent||'?')[0]+'</div>';
    const loc = g.location==='home' ? 'Home' : g.location==='away' ? 'Away' : 'Neutral';
    const scoreHtml = hasResult
      ? '<div class="score '+(isWin?'win':'loss')+'">'+g.result+'</div>'
      : '<div class="score tbd">'+(g.time==='TBD'?'TBD':g.time)+'</div>';

    html += '<div class="game '+cls+'">'
      +'<div class="date-col"><div class="mon">'+mon+'</div><div class="num">'+num+'</div><div class="dow">'+(g.day||'')+'</div></div>'
      +'<div class="sep"></div>'
      +logoHtml
      +'<div class="info"><div class="opp">'+(g.location==='away'?'@ ':'')+g.opponent+'</div><div class="meta">'+loc+(hasResult?'':' · Upcoming')+'</div></div>'
      +scoreHtml
      +'</div>';
  });
  document.getElementById('list').innerHTML = html;
}

async function doRefresh() {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  document.getElementById('err').innerHTML = '';
  document.getElementById('ts').textContent = 'Fetching latest scores...';

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type: 'schedule'})
    });
    const html = await res.text();

    // Parse scores from utsports.com schedule page
    const overrides = {};
    SCHEDULE.forEach(function(g, i) {
      const key = i+'_'+g.date.replace(' ','').toLowerCase()+'_'+g.opponent.toLowerCase().replace(/\s/g,'');
      // Look for win/loss patterns near the opponent name in the HTML
      const oppEscaped = g.opponent.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const pattern = new RegExp(oppEscaped+'[\\s\\S]{0,300}?(W|L)\\s*(\\d+)-(\\d+)','i');
      const match = html.match(pattern);
      if (match) {
        overrides[key] = match[1].toUpperCase()+' '+match[2]+'-'+match[3];
      }
    });
    saveCache(overrides);
    const games = applyOverrides(SCHEDULE, overrides);
    render(games);
    document.getElementById('ts').textContent = fmtTs(Date.now());
  } catch(e) {
    const cached = loadCache();
    const games = applyOverrides(SCHEDULE, cached ? cached.overrides : null);
    render(games);
    document.getElementById('err').innerHTML = '<div class="err">'+e.message+'</div>';
    document.getElementById('ts').textContent = cached ? fmtTs(cached.ts)+' (cached)' : 'Using hardcoded scores';
  }

  busy = false;
  btn.disabled = false;
  btn.textContent = 'Refresh';
}

// On load: show schedule with hardcoded scores + any cached overrides
const cached = loadCache();
const games = applyOverrides(SCHEDULE, cached ? cached.overrides : null);
render(games);
document.getElementById('ts').textContent = cached ? fmtTs(cached.ts) : 'Scores current as of Mar 13 · Tap Refresh to update';
</script>

</html>
